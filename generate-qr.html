<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate QR Code Santri</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .qr-container {
            background-color: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 100%;
            max-width: 500px;
        }
        h1 {
            color: #28a745;
            margin-bottom: 25px;
            font-size: 2em;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }
        input[type="text"] {
            width: calc(100% - 20px);
            padding: 12px 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            box-sizing: border-box;
        }
        button {
            background-color: #28a745;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: 600;
            transition: background-color 0.3s ease;
            margin-top: 10px; /* Tambahkan sedikit margin */
        }
        button:hover {
            background-color: #218838;
        }
        #qrcode-display {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        #qrcode-display p {
            font-size: 1.1em;
            color: #666;
            word-break: break-all;
        }
        #qrcode {
            border: 2px solid #ddd;
            padding: 10px;
            border-radius: 8px;
            display: inline-block; /* Agar border membungkus QR */
        }
        .note {
            font-size: 0.9em;
            color: #888;
            margin-top: 20px;
        }
        #downloadQrBtn {
            background-color: #007bff; /* Warna biru untuk tombol download */
        }
        #downloadQrBtn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="qr-container">
        <h1>Generate QR Code Santri</h1>
        <div class="form-group">
            <label for="nikInput">Masukkan NIK Santri:</label>
            <input type="text" id="nikInput" placeholder="Contoh: 123">
        </div>
        <button onclick="generateQRCode()">Generate QR Code</button>

        <div id="qrcode-display">
            <p>Scan QR Code di bawah ini:</p>
            <div id="qrcode"></div>
            <p id="generatedUrl"></p>
            <button id="downloadQrBtn" style="display:none;">Unduh QR Code (PNG)</button>
        </div>
        <p class="note">Pastikan NIK yang dimasukkan benar. QR Code ini akan mengarah ke halaman detail santri.</p>
    </div>

    <script>
        let currentQrCode; // Variabel global untuk menyimpan instance QR code

        function generateQRCode() {
            const nik = document.getElementById('nikInput').value.trim();
            const qrcodeDiv = document.getElementById('qrcode');
            const generatedUrlP = document.getElementById('generatedUrl');
            const downloadButton = document.getElementById('downloadQrBtn');

            if (!nik) {
                alert('NIK tidak boleh kosong!');
                return;
            }

            // Bersihkan QR Code sebelumnya
            qrcodeDiv.innerHTML = '';
            downloadButton.style.display = 'none'; // Sembunyikan tombol download dulu

            const basePath = window.location.origin + '/';
            const santriDetailUrl = `${basePath}santri-detail.html?nik=${nik}`;

            // Simpan instance QR code yang dibuat
            currentQrCode = new QRCode(qrcodeDiv, {
                text: santriDetailUrl,
                width: 256,
                height: 256,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });

            generatedUrlP.textContent = `URL: ${santriDetailUrl}`;

            // Tampilkan div QR Code setelah generate
            document.getElementById('qrcode-display').style.display = 'flex';

            // Setelah QR code digambar (ada jeda waktu), tampilkan tombol download
            // Menggunakan setTimeout untuk memastikan QR code sudah selesai digambar ke canvas/svg
            setTimeout(() => {
                downloadButton.style.display = 'block';
            }, 500); // Beri sedikit waktu, bisa disesuaikan
        }

        // Fungsi untuk mengunduh QR Code
        document.getElementById('downloadQrBtn').addEventListener('click', () => {
            const nik = document.getElementById('nikInput').value.trim();
            const qrcodeDiv = document.getElementById('qrcode');
            let imgDataUrl;

            // qrcode.js akan menambahkan elemen Canvas atau Img (jika SVG) ke dalam div#qrcode
            // Kita perlu menemukan elemen Canvas di dalamnya
            const canvasElement = qrcodeDiv.querySelector('canvas');
            const imgElement = qrcodeDiv.querySelector('img'); // Mungkin juga ada img jika SVG

            if (canvasElement) {
                imgDataUrl = canvasElement.toDataURL("image/png"); // Dapatkan data URL dari Canvas
            } else if (imgElement && imgElement.src.startsWith('data:image/')) {
                // Jika itu adalah SVG yang dirender sebagai data URL gambar
                imgDataUrl = imgElement.src;
            } else {
                alert('QR Code tidak ditemukan atau tidak dalam format yang dapat diunduh.');
                return;
            }

            // Buat elemen <a> sementara untuk trigger download
            const link = document.createElement('a');
            link.href = imgDataUrl;
            link.download = `QR_Santri_${nik}.png`; // Nama file yang diunduh
            document.body.appendChild(link); // Tambahkan ke DOM (sementara)
            link.click(); // Klik secara programatis
            document.body.removeChild(link); // Hapus dari DOM
        });


        // Sembunyikan div QR Code saat pertama kali dimuat
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('qrcode-display').style.display = 'none';
        });
    </script>
</body>
</html>
