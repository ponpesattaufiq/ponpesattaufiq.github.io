<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate QR Code Santri</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .qr-container {
            background-color: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 100%;
            max-width: 500px;
        }
        h1 {
            color: #28a745;
            margin-bottom: 25px;
            font-size: 2em;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }
        input[type="text"] {
            width: calc(100% - 20px);
            padding: 12px 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            box-sizing: border-box;
        }
        button {
            background-color: #28a745;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: 600;
            transition: background-color 0.3s ease;
            margin-top: 10px;
        }
        button:hover {
            background-color: #218838;
        }
        #qrcode-display {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        #qrcode-display p {
            font-size: 1.1em;
            color: #666;
            word-break: break-all;
        }
        #qrcode {
            border: 2px solid #ddd;
            padding: 10px;
            border-radius: 8px;
            display: inline-block;
        }
        .note {
            font-size: 0.9em;
            color: #888;
            margin-top: 20px;
        }
        #downloadQrBtn {
            background-color: #007bff;
        }
        #downloadQrBtn:hover {
            background-color: #0056b3;
        }
        /* Hidden canvas for high-res download */
        #hiddenCanvas {
            display: none; /* Ini penting agar canvas tidak terlihat */
        }
    </style>
</head>
<body>
    <div class="qr-container">
        <h1>Generate QR Code Santri</h1>
        <div class="form-group">
            <label for="nikInput">Masukkan NIK Santri:</label>
            <input type="text" id="nikInput" placeholder="Contoh: 123">
        </div>
        <button onclick="generateQRCode()">Generate QR Code</button>

        <div id="qrcode-display">
            <p>Scan QR Code di bawah ini:</p>
            <div id="qrcode"></div>
            <p id="generatedUrl"></p>
            <button id="downloadQrBtn" style="display:none;">Unduh QR Code (PNG)</button>
        </div>
        <p class="note">Pastikan NIK yang dimasukkan benar. QR Code ini akan mengarah ke halaman detail santri.</p>

        <canvas id="hiddenCanvas"></canvas>
    </div>

    <script>
        function generateQRCode() {
            const nik = document.getElementById('nikInput').value.trim();
            const qrcodeDiv = document.getElementById('qrcode');
            const generatedUrlP = document.getElementById('generatedUrl');
            const downloadButton = document.getElementById('downloadQrBtn');

            if (!nik) {
                alert('NIK tidak boleh kosong!');
                return;
            }

            // Bersihkan QR Code yang ditampilkan sebelumnya
            qrcodeDiv.innerHTML = '';
            downloadButton.style.display = 'none';

            const basePath = window.location.origin + '/';
            const santriDetailUrl = `${basePath}santri-detail.html?nik=${nik}`;

            // Generate QR Code for DISPLAY (normal resolution, directly into the div)
            // Ini adalah QR yang akan terlihat di layar
            new QRCode(qrcodeDiv, {
                text: santriDetailUrl,
                width: 256, // Ukuran untuk tampilan di layar
                height: 256,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H,
                render: 'canvas' // Pastikan menggunakan Canvas untuk konsistensi
            });

            generatedUrlP.textContent = `URL: ${santriDetailUrl}`;

            // Tampilkan area tampilan QR code
            document.getElementById('qrcode-display').style.display = 'flex';

            // Tampilkan tombol download setelah sedikit jeda untuk memastikan QR code tampilan sudah dirender
            setTimeout(() => {
                downloadButton.style.display = 'block';
            }, 500); 
        }

        // Fungsi untuk mengunduh QR Code (High Resolution)
        document.getElementById('downloadQrBtn').addEventListener('click', () => {
            const nik = document.getElementById('nikInput').value.trim();
            const santriDetailUrl = `${window.location.origin}/santri-detail.html?nik=${nik}`;

            // Dapatkan canvas tersembunyi
            const hiddenCanvas = document.getElementById('hiddenCanvas');
            const ctx = hiddenCanvas.getContext('2d');

            // Tentukan resolusi optimal untuk download
            // Menggunakan ukuran dasar 512px atau 1024px adalah umum untuk kualitas tinggi
            // dan dikalikan dengan devicePixelRatio untuk kepadatan piksel yang sebenarnya
            const baseSize = 512; // Coba 512 atau 1024 untuk resolusi sangat tinggi
            const pixelRatio = window.devicePixelRatio || 1; 
            const actualSize = baseSize * pixelRatio; // Ukuran canvas aktual dalam piksel perangkat

            hiddenCanvas.width = actualSize;
            hiddenCanvas.height = actualSize;

            // Bersihkan canvas tersembunyi
            ctx.clearRect(0, 0, hiddenCanvas.width, hiddenCanvas.height);

            // Buat div sementara untuk menjadi host QR code beresolusi tinggi
            // Ini adalah workaround untuk qrcode.js agar bisa merender ke canvas baru
            const tempDiv = document.createElement('div');
            tempDiv.style.position = 'absolute';
            tempDiv.style.left = '-9999px'; // Sembunyikan dari tampilan
            document.body.appendChild(tempDiv);

            // Generate QR code ke div sementara ini dengan resolusi tinggi
            new QRCode(tempDiv, {
                text: santriDetailUrl,
                width: actualSize,
                height: actualSize,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H,
                render: 'canvas' // Paksa rendering ke canvas
            });

            // Tunggu sebentar agar QR code dirender ke canvas sementara
            setTimeout(() => {
                const tempCanvas = tempDiv.querySelector('canvas');
                if (tempCanvas) {
                    // Gambar konten dari canvas sementara ke canvas tersembunyi utama kita
                    // Ini mentransfer gambar QR code resolusi tinggi
                    ctx.drawImage(tempCanvas, 0, 0, actualSize, actualSize);

                    // Dapatkan data URL (PNG) dari canvas tersembunyi beresolusi tinggi
                    const imgDataUrl = hiddenCanvas.toDataURL("image/png");

                    // Buat link sementara untuk memicu download
                    const link = document.createElement('a');
                    link.href = imgDataUrl;
                    link.download = `QR_Santri_${nik}.png`; // Nama file
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                } else {
                    alert('Gagal membuat QR Code resolusi tinggi untuk diunduh. Canvas tidak ditemukan.');
                }
                // Bersihkan div sementara
                document.body.removeChild(tempDiv);
            }, 100); // Jeda kecil untuk rendering temp canvas
        });

        // Sembunyikan div QR Code saat pertama kali dimuat
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('qrcode-display').style.display = 'none';
        });
    </script>
</body>
</html>
