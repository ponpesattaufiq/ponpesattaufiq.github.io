<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Wali Santri | Sekretariat MUDI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header class="main-header">
        <div class="header-content">
            <div class="logo">
                <img src="https://sekretariatmudi.web.id/Md/assets/images/logo.png" alt="Logo MUDI">
                <span>Sekretariat MUDI</span>
            </div>
            <nav class="main-nav">
                <ul>
                    <li><a href="#">HOME</a></li>
                    <li class="dropdown">
                        <a href="#">PROFILE <i class="fas fa-chevron-down"></i></a>
                        <div class="dropdown-content">
                            <a href="#">Sejarah</a>
                            <a href="#">Visi Misi</a>
                        </div>
                    </li>
                    <li class="dropdown">
                        <a href="#">LAYANAN <i class="fas fa-chevron-down"></i></a>
                        <div class="dropdown-content">
                            <a href="#">Informasi Akademik</a>
                            <a href="#">Keuangan</a>
                        </div>
                    </li>
                    <li class="dropdown">
                        <a href="#">PENDAFTARAN <i class="fas fa-chevron-down"></i></a>
                        <div class="dropdown-content">
                            <a href="#">Syarat Pendaftaran</a>
                            <a href="#">Formulir Online</a>
                        </div>
                    </li>
                    <li><a href="#">ALUMNI</a></li>
                </ul>
            </nav>
            <div class="login-button">
                <a href="#" class="btn-login"><i class="fas fa-sign-in-alt"></i> Login</a>
            </div>
        </div>
    </header>

    <div class="hero-section">
        <div class="hero-text">
            <h1>Login Wali Santri</h1>
        </div>
        <div class="hero-wave"></div>
    </div>

    <div class="content-wrapper login-page-content">
        <div class="container login-container">
            <h2>Masuk ke Akun Anda</h2>
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" id="loginButton">Login</button>
                <p id="loginMessage" class="error-message" style="display: none;"></p>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
